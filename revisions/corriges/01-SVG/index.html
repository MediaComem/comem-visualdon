<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <title>01 · Dessiner avec du code</title>
</head>
<body>

<h1>Dessiner avec du code</h1>

<!-- Rectangle (click : changer de couleur) -->
<h2>Rectangle</h2>
<div class="row">
  <div>
    <h3>SVG</h3>
    <svg width="800" height="300" style="cursor:pointer">
      <rect id="rectangle-svg" width="800" height="300" fill="red"></rect>
    </svg>
  </div>
  <div>
    <h3>Canvas</h3>
    <canvas id="canvas-rect" width="800" height="300" style="cursor:pointer"></canvas>
  </div>
</div>

<!-- Donut (hover : agrandir le cercle extérieur) -->
<h2>Donut 🍩</h2>
<div class="row">
  <div>
    <h3>SVG</h3>
    <svg width="220" height="220">
      <circle id="donut-outer" cx="110" cy="110" r="60" fill="transparent" stroke="black" stroke-width="2" style="cursor:pointer"></circle>
      <circle cx="110" cy="110" r="30" fill="none" stroke="black" stroke-width="2"></circle>
    </svg>
  </div>
  <div>
    <h3>Canvas</h3>
    <canvas id="canvas-donut" width="220" height="220"></canvas>
  </div>
</div>

<!-- Ligne -->
<h2>Ligne</h2>
<p>Ligne passant par A (70, 90), longueur 100px, pente 5. &Delta;x = 100/&radic;26 &asymp; 19.6, &Delta;y = 500/&radic;26 &asymp; 98.1</p>
<div class="row">
  <div>
    <h3>SVG</h3>
    <svg width="200" height="250">
      <circle cx="70" cy="90" r="3" fill="red"></circle>
      <line x1="70" y1="90" x2="90" y2="188" stroke="black" stroke-width="2"></line>
    </svg>
  </div>
  <div>
    <h3>Canvas</h3>
    <canvas id="canvas-line" width="200" height="250"></canvas>
  </div>
</div>

<!-- Chemin libre : lettre N (animation le long du chemin) -->
<h2>Chemin libre · lettre N</h2>
<div class="row">
  <div>
    <h3>SVG</h3>
    <svg width="200" height="120">
      <path id="lettre" d="M 20 100 L 20 10 L 80 100 L 80 10 L 80 100"
            fill="none" stroke="steelblue" stroke-width="5"></path>
      <circle r="5" fill="red">
        <animateMotion dur="1.5s" repeatCount="indefinite">
          <mpath href="#lettre"></mpath>
        </animateMotion>
      </circle>
    </svg>
  </div>
  <div>
    <h3>Canvas</h3>
    <div class="canvas-container">
      <canvas id="canvas-path" width="200" height="120"></canvas>
      <canvas id="canvas-anim" width="200" height="120" class="canvas-overlay"></canvas>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
